name: Likelion CI/CD

run-name: ${{ github.actor }} — CI/CD to EC2

on:
  push:
    branches: [main, master]
  pull_request:

env:
  NODE_VERSION: "22"
  # GitHub Secrets 기본값 (로컬 scp와 동일하게 맞춤)
  # EC2_HOST          → 54.180.113.155
  # EC2_USER          → ec2-user
  # EC2_DEPLOY_PATH   → /home/ec2-user/sample-server
  # EC2_SSH_PRIVATE_KEY → ci-sample.pem 파일 전체 내용

jobs:
  ci:
    name: CI (lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: |
            dist
            package.json
            tsconfig.json
            tsconfig.build.json
          retention-days: 7

  deploy:
    name: CD (scp → EC2)
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy files to EC2 (scp)
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -r \
            dist \
            package.json \
            tsconfig.json \
            tsconfig.build.json \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/"

      - name: Install dependencies and restart app on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "set -e
             cd '${{ secrets.EC2_DEPLOY_PATH }}'
             export NODE_ENV=production
             npm install --omit=dev
             pkill -f 'node dist/main' 2>/dev/null || true
             nohup npm run start:prod >> app.log 2>&1 &
             sleep 1
             echo 'Deploy complete. Listening on port' \${PORT:-3000}"
