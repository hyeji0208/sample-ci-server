name: Likelion CI/CD

run-name: ${{ github.actor }} — CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DOCKER_IMAGE: sample-server
  CONTAINER_NAME: sample-server
  APP_PORT: "3000"

jobs:
  ci:
    name: CI (lint · test · build · docker)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker:
    name: CD — Docker Hub push
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}"
          echo "image=${IMAGE}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_latest }}
            ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD — EC2 (Docker pull & run)
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deploy script to EC2
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            scripts/ec2-docker-deploy.sh \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/ec2-docker-deploy.sh"

      - name: Verify image tag from docker job
        run: |
          if [ -z "${{ needs.docker.outputs.image }}" ]; then
            echo "ERROR: docker job did not produce an image tag."
            exit 1
          fi
          echo "Deploying: ${{ needs.docker.outputs.image }}"

      - name: Deploy container on EC2
        env:
          DOCKER_IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          printf '%s\n' \
            "DOCKER_IMAGE=${DOCKER_IMAGE}" \
            "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" \
            "DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}" \
            "APP_PORT=${{ env.APP_PORT }}" \
            "CONTAINER_NAME=${{ env.CONTAINER_NAME }}" \
            > deploy.env
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            deploy.env \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy.env"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod +x /tmp/ec2-docker-deploy.sh && set -a && source /tmp/deploy.env && set +a && bash /tmp/ec2-docker-deploy.sh"
