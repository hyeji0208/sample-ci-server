name: Likelion CI/CD

run-name: ${{ github.actor }} — CI/CD to EC2

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DOCKER_IMAGE: sample-ci-server
  # GitHub Secrets (Repository → Settings → Secrets and variables → Actions)
  # EC2_HOST, EC2_USER, EC2_DEPLOY_PATH, EC2_SSH_PRIVATE_KEY — EC2 scp 배포
  # DOCKERHUB_USERNAME, DOCKERHUB_TOKEN — Docker Hub 푸시

jobs:
  ci:
    name: CI (lint · test · build · docker)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deploy bundle
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: |
            dist
            package.json
            tsconfig.json
            tsconfig.build.json
            scripts/ec2-deploy.sh
          retention-days: 7

  docker:
    name: CD (Docker Hub push)
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD (scp → EC2)
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy files to EC2 (scp)
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -r \
            dist \
            package.json \
            tsconfig.json \
            tsconfig.build.json \
            scripts \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_DEPLOY_PATH }}/"

      - name: Install dependencies and restart app on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod +x '${{ secrets.EC2_DEPLOY_PATH }}/scripts/ec2-deploy.sh' && APP_DIR='${{ secrets.EC2_DEPLOY_PATH }}' bash '${{ secrets.EC2_DEPLOY_PATH }}/scripts/ec2-deploy.sh'"
